# In-container nginx for the frontend service.
# - serves static files
# - proxies /api/* to the legalshield-api container by service name
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location = /health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Proxy API to the sibling container.
    # In docker-compose.local.yml the api is on service name `legalshield-api`.
    # In production the host nginx terminates TLS and proxies directly to
    # 127.0.0.1:8090, so this block is dev-only but harmless in prod.
    location /api/ {
        proxy_pass         http://legalshield-api:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
