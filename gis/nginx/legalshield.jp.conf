# Host-nginx vhost for LegalShield-jp on the shared EC2.
# Drop into /etc/nginx/sites-enabled/  next to hiiforest.com.conf
#
# Assumes:
#   - certbot has issued a Let's Encrypt cert at /etc/letsencrypt/live/legalshield.jp/
#     (alternative: AWS ACM via ALB; in that case strip the SSL block and listen 80.)
#   - the docker-compose.yml on this same host exposes:
#       127.0.0.1:8090  -> legalshield-api
#       127.0.0.1:8092  -> legalshield-frontend (static)

# ─── Redirect HTTP → HTTPS ─────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name legalshield.jp www.legalshield.jp;

    # Let certbot answer ACME challenges
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── Main HTTPS vhost ──────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name legalshield.jp www.legalshield.jp;

    ssl_certificate     /etc/letsencrypt/live/legalshield.jp/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/legalshield.jp/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    client_max_body_size 5m;

    # ─── API ──────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8090;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # FastAPI Swagger / ReDoc
    location ~ ^/(docs|redoc|openapi.json) {
        proxy_pass         http://127.0.0.1:8090;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ─── Static frontend ──────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8092;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    access_log /var/log/nginx/legalshield.access.log;
    error_log  /var/log/nginx/legalshield.error.log warn;
}
